<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mad API</title>
    <link rel="icon" href="./assets/mad-logo.svg" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #070908;
        --panel: #101514;
        --panel-strong: #151b19;
        --text: oklch(0.965 0 0);
        --muted: oklch(0.78 0 0);
        --line: rgba(205, 174, 105, 0.24);
        --cyan: #70e8d2;
        --lime: #c7f36b;
        --coral: #ff806e;
        --gold: #c8a96a;
        --gold-bright: #f0dca7;
        --gold-deep: #5a4520;
        --titanium: #171612;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      body {
        overflow-x: hidden;
      }

      button,
      a {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        isolation: isolate;
        background: #070908;
      }

      .header {
        position: relative;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: min(1280px, calc(100% - 48px));
        height: 64px;
        margin: 0 auto;
        padding: 0 8px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 650;
      }

      .brand img {
        width: 28px;
        height: 28px;
        border-radius: 8px;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 2px;
        color: #aab5b1;
        font-size: 13px;
      }

      .nav a {
        padding: 6px 12px;
        border-radius: 8px;
        transition: color 180ms ease;
      }

      .nav a:first-child,
      .nav a:hover {
        color: var(--text);
      }

      .login {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 58px;
        height: 32px;
        margin-left: 4px;
        padding: 0 14px !important;
        border: 0;
        border-radius: 8px !important;
        background: var(--text);
        color: #0a0d0c;
        font-size: 12px;
        font-weight: 650;
      }

      .nav-divider {
        width: 1px;
        height: 16px;
        margin: 0 8px;
        background: rgba(112, 232, 210, 0.16);
      }

      .nav-icon {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        padding: 0 !important;
        border-radius: 8px !important;
        color: #98a5a1;
        font-size: 13px;
      }

      .hero {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 100svh;
        padding: 96px 32px 48px;
      }

      .orbit-field {
        position: absolute;
        top: 48%;
        left: 50%;
        width: min(960px, 78vw);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        z-index: -2;
      }

      .orbit {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(200, 169, 106, 0.16);
        border-radius: 50%;
        animation: spin 28s linear infinite;
      }

      .spark {
        position: absolute;
        top: -4px;
        left: calc(50% - 4px);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--gold-bright);
        box-shadow:
          0 0 9px rgba(240, 220, 167, 0.92),
          0 0 24px rgba(200, 169, 106, 0.58),
          0 0 48px rgba(200, 169, 106, 0.24);
      }

      .orbit.two {
        inset: 10%;
        border-style: dashed;
        border-color: rgba(145, 120, 70, 0.14);
        animation-duration: 34s;
        animation-direction: reverse;
      }

      .orbit.two .spark {
        width: 6px;
        height: 6px;
        background: #a98b55;
        box-shadow: 0 0 18px rgba(200, 169, 106, 0.46);
      }

      .orbit.three {
        inset: 22%;
        border-color: rgba(230, 207, 151, 0.2);
        animation-duration: 18s;
      }

      .orbit.three .spark {
        top: auto;
        bottom: -4px;
        background: #f4e5bd;
      }

      .orbit-core {
        position: absolute;
        inset: 35%;
        border: 1px solid rgba(204, 173, 108, 0.18);
        border-radius: 50%;
        box-shadow:
          0 0 100px rgba(200, 169, 106, 0.055),
          inset 0 0 80px rgba(200, 169, 106, 0.04);
      }

      .scan {
        position: absolute;
        top: 12%;
        bottom: 10%;
        left: 50%;
        width: 1px;
        background: rgba(218, 190, 128, 0.09);
        box-shadow: 0 0 34px rgba(218, 190, 128, 0.2);
        animation: scan 5.5s ease-in-out infinite;
      }

      .node {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 7px;
        width: 86px;
        aspect-ratio: 1;
        border-radius: 50%;
        border: 1px solid transparent;
        background:
          linear-gradient(#0b0b09, #0b0b09) padding-box,
          linear-gradient(125deg, #302819, #b79856, #4c3e25, #e4cc8c, #302819) border-box;
        color: #a89162;
        font-size: 9px;
        font-weight: 720;
        letter-spacing: 0.8px;
        box-shadow:
          0 0 0 9px rgba(200, 169, 106, 0.025),
          0 14px 36px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.045);
        background-size: 100% 100%, 220% 100%;
        animation:
          drift 4.8s ease-in-out infinite,
          borderFlow 8s ease-in-out infinite;
      }

      .node img {
        display: block;
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      .node img.zhipu-mark {
        width: 58px;
        height: 24px;
      }

      .node img.kimi-mark {
        width: 32px;
        height: 32px;
        border-radius: 8px;
      }

      .node img.minimax-mark {
        width: 31px;
        height: 31px;
        border-radius: 8px;
      }

      .node img.gemini-mark {
        width: 36px;
        height: 36px;
      }

      .node.openai {
        top: 8%;
        right: 18%;
      }

      .node.grok {
        top: 35%;
        right: 0;
        animation-delay: -1.6s;
      }

      .node.zhipu {
        right: 10%;
        bottom: 13%;
        animation-delay: -2.4s;
      }

      .node.claude {
        top: 34%;
        left: 0;
        animation-delay: -2.9s;
      }

      .node.kimi {
        top: 8%;
        left: 18%;
        animation-delay: -1.1s;
      }

      .node.gemini {
        bottom: 13%;
        left: 10%;
        animation-delay: -3.5s;
      }

      .node.minimax {
        bottom: 1%;
        left: calc(50% - 43px);
        animation-delay: -2s;
      }

      .hero-content {
        width: min(780px, 100%);
        text-align: center;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 9px;
        width: fit-content;
        min-height: 36px;
        padding: 0 18px;
        margin: 26px auto 0;
        border: 1px solid rgba(206, 174, 105, 0.46);
        border-radius: 999px;
        background: rgba(10, 13, 12, 0.84);
        color: var(--text);
        font-size: 13px;
        font-weight: 750;
        box-shadow:
          0 0 24px rgba(200, 169, 106, 0.09),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .eyebrow i {
        display: block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold-bright);
        box-shadow: 0 0 12px rgba(240, 220, 167, 0.82);
      }

      h1,
      .gateway {
        color: var(--text);
        -webkit-text-stroke: 2.5px rgba(0, 0, 0, 0.96);
        paint-order: stroke fill;
        text-shadow:
          3px 0 0 #020202,
          -3px 0 0 #020202,
          0 3px 0 #020202,
          0 -3px 0 #020202,
          0 10px 30px rgba(0, 0, 0, 0.52);
      }

      h1 {
        display: block;
        width: fit-content;
        margin: 0 auto;
        font-size: clamp(60px, 6.5vw, 98px);
        line-height: 0.9;
        font-weight: 900;
        transform-origin: center;
        will-change: transform;
        animation: glitch 3s steps(1, end) infinite;
      }

      .gateway {
        position: relative;
        display: inline-block;
        margin-top: 14px;
        font-size: clamp(38px, 4vw, 62px);
        line-height: 1;
        font-weight: 850;
      }

      .endpoint {
        position: relative;
        display: flex;
        align-items: center;
        gap: 16px;
        width: min(690px, 100%);
        margin: 34px auto 0;
        min-height: 62px;
        padding: 8px 10px 8px 18px;
        border: 1px solid transparent;
        border-radius: 18px;
        corner-shape: squircle;
        background:
          linear-gradient(#11100d, #11100d) padding-box,
          linear-gradient(110deg, #342b1a, #c6a864, #443820, #ead59d, #342b1a) border-box;
        background-size: 100% 100%, 240% 100%;
        box-shadow:
          0 18px 60px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.055);
        animation: borderFlow 9s ease-in-out infinite;
      }

      .endpoint-label {
        flex: 0 0 auto;
        color: #8f8674;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.4px;
      }

      .online {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        flex: 0 0 auto;
        color: var(--gold-bright);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.1px;
      }

      .online::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold-bright);
        box-shadow: 0 0 10px rgba(240, 220, 167, 0.78);
      }

      .endpoint code {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        color: var(--text);
        font-family: inherit;
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 1.4px;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .copy {
        flex: 0 0 auto;
        width: 76px;
        height: 36px;
        border: 0;
        border-left: 1px solid rgba(200, 169, 106, 0.2);
        border-radius: 11px;
        corner-shape: squircle;
        background: #1c1913;
        color: var(--gold-bright);
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 176px;
        height: 50px;
        padding: 0 24px;
        border: 1px solid rgba(206, 174, 105, 0.54);
        border-radius: 14px;
        corner-shape: squircle;
        font-size: 14px;
        font-weight: 850;
      }

      .button.primary {
        background: #d6bb7a;
        color: #15130f;
        box-shadow:
          0 0 26px rgba(200, 169, 106, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
      }

      .button.secondary {
        background: rgba(12, 11, 9, 0.78);
        color: var(--gold-bright);
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 28px;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 9px 16px 9px 11px;
        border: 1px solid rgba(214, 178, 96, 0.58);
        border-radius: 12px;
        background: rgba(13, 12, 9, 0.96);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        box-shadow:
          0 16px 40px rgba(0, 0, 0, 0.46),
          0 0 24px rgba(200, 169, 106, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.055);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px) scale(0.98);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast::before {
        content: "\2713";
        display: grid;
        place-items: center;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border: 1px solid rgba(214, 178, 96, 0.74);
        border-radius: 50%;
        background: #17130b;
        color: var(--gold-bright);
        font-size: 13px;
        line-height: 1;
        box-shadow: 0 0 12px rgba(200, 169, 106, 0.12);
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes scan {
        0%,
        100% {
          transform: translateX(-260px);
          opacity: 0;
        }
        20%,
        80% {
          opacity: 1;
        }
        50% {
          transform: translateX(260px);
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      @keyframes glitch {
        0%,
        91%,
        96%,
        100% {
          transform: translate(0, 0);
        }
        92% {
          transform: translate(5px, -1px);
        }
        93% {
          transform: translate(-4px, 1px);
        }
        94% {
          transform: translate(2px, 0);
        }
      }

      @keyframes borderFlow {
        0%,
        100% {
          background-position: 0 0, 0% 50%;
        }
        50% {
          background-position: 0 0, 100% 50%;
        }
      }

      @media (max-width: 800px) {
        .header {
          width: calc(100% - 32px);
        }

        .nav a {
          display: none;
        }

        .hero {
          padding: 92px 18px 80px;
        }

        .hero-content {
          width: calc(100vw - 36px);
          max-width: calc(100vw - 36px);
          min-width: 0;
        }

        h1 {
          font-size: 52px;
        }

        .gateway {
          font-size: 32px;
        }

        h1,
        .gateway {
          -webkit-text-stroke-width: 2px;
        }

        .orbit-field {
          width: 130vw;
        }

        .node {
          width: 60px;
        }

        .node.claude,
        .node.grok,
        .node.kimi,
        .node.minimax {
          display: none;
        }

        .endpoint {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto 66px;
          gap: 8px 12px;
          max-width: 100%;
          padding: 11px 12px 11px 16px;
        }

        .endpoint-label {
          grid-column: 1 / -1;
          text-align: left;
        }

        .endpoint code {
          font-size: 10px;
        }

        .copy {
          width: 66px;
        }

        .actions {
          flex-direction: column;
          align-items: stretch;
        }

        .button {
          width: 100%;
        }

      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="hero">
        <div class="orbit-field" aria-hidden="true">
          <div class="orbit"><span class="spark"></span></div>
          <div class="orbit two"><span class="spark"></span></div>
          <div class="orbit three"><span class="spark"></span></div>
          <div class="orbit-core"></div>
          <div class="scan"></div>
          <span class="node openai">
            <img src="./assets/brands/openai-white.svg" alt="" />
            <span>OPENAI</span>
          </span>
          <span class="node grok">
            <img src="./assets/brands/grok-white.svg" alt="" />
            <span>GROK</span>
          </span>
          <span class="node zhipu">
            <img class="zhipu-mark" src="./assets/brands/zhipu.svg" alt="" />
            <span>ZHIPU AI</span>
          </span>
          <span class="node claude">
            <img src="./assets/brands/claude.png" alt="" />
            <span>CLAUDE</span>
          </span>
          <span class="node kimi">
            <img class="kimi-mark" src="./assets/brands/kimi.png" alt="" />
            <span>KIMI</span>
          </span>
          <span class="node gemini">
            <img class="gemini-mark" src="./assets/brands/gemini-icon.svg" alt="" />
            <span>GEMINI</span>
          </span>
          <span class="node minimax">
            <img class="minimax-mark" src="./assets/brands/minimax.png" alt="" />
            <span>MINIMAX</span>
          </span>
        </div>

        <section class="hero-content" aria-labelledby="title">
          <h1 id="title">Mad API</h1>
          <div class="gateway">Unified Gateway</div>
          <p class="eyebrow"><i></i> AI 模型与 API 服务平台</p>

          <div class="endpoint" aria-label="API 接入地址">
            <span class="endpoint-label">API BASE URL</span>
            <code>https://mad.myddns.me/v1</code>
            <span class="online">ONLINE</span>
            <button class="copy" type="button">复制</button>
          </div>

          <div class="actions">
            <a class="button primary" href="/console" target="_top">进入控制台</a>
            <a class="button secondary" href="/pricing" target="_top">查看模型价格</a>
          </div>
        </section>

      </main>
    </div>

    <div class="toast" role="status">API 地址已复制</div>
    <script>
      const copyButton = document.querySelector('.copy')
      const toast = document.querySelector('.toast')
      let lastReportedScrollState = null

      function reportScrollState() {
        const scrolled = window.scrollY > 20
        if (scrolled === lastReportedScrollState) return
        lastReportedScrollState = scrolled
        window.parent.postMessage({ type: 'mad-home:scroll', scrolled }, '*')
      }

      function legacyCopy(value) {
        const input = document.createElement('textarea')
        input.value = value
        input.setAttribute('readonly', '')
        input.style.position = 'fixed'
        input.style.left = '-9999px'
        input.style.opacity = '0'
        document.body.appendChild(input)
        input.focus()
        input.select()
        input.setSelectionRange(0, input.value.length)

        let copied = false
        try {
          copied = document.execCommand('copy')
        } catch (_) {
          copied = false
        }

        input.remove()
        return copied
      }

      copyButton.addEventListener('click', async () => {
        const value = 'https://mad.myddns.me/v1'
        let copied = false

        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(value)
            copied = true
          } catch (_) {
            copied = false
          }
        }

        if (!copied) copied = legacyCopy(value)

        copyButton.textContent = copied ? '已复制' : '请手动复制'
        toast.textContent = copied ? 'API 地址已复制' : value
        toast.classList.add('show')
        window.setTimeout(() => {
          copyButton.textContent = '复制'
          toast.classList.remove('show')
        }, copied ? 1600 : 3000)
      })

      window.addEventListener('scroll', reportScrollState, { passive: true })
      reportScrollState()
    </script>
  </body>
</html>
