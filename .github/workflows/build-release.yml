name: Build Mad New API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'

permissions:
  contents: write

concurrency:
  group: mad-new-api-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out build configuration
        uses: actions/checkout@v4

      - name: Check out upstream New API
        uses: actions/checkout@v4
        with:
          repository: QuantumNous/new-api
          ref: 5a6c53d4966b2e34690ab49f3dd19be01c88fdbe
          path: source
          fetch-depth: 1

      - name: Install Mad API static assets
        run: |
          mkdir -p source/web/default/public
          cp -R "$GITHUB_WORKSPACE/assets/." source/web/default/public/

      - name: Apply Mad API patches
        run: |
          for patch in "$GITHUB_WORKSPACE"/patches/*.patch; do
            git -C source apply --check "$patch"
            git -C source apply "$patch"
          done

      - name: Verify protected Mad API customizations
        working-directory: source
        run: sha256sum --check "$GITHUB_WORKSPACE/guards/customizations.sha256"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: source/go.mod
          cache-dependency-path: source/go.sum

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: source/web
        run: bun install --frozen-lockfile

      - name: Verify billing patch formatting
        working-directory: source
        run: |
          files=(
            controller/playground.go
            middleware/distributor.go
            middleware/playground_path.go
            middleware/playground_path_test.go
            relay/common/relay_info.go
            relay/relay_task.go
            relay/relay_task_billing_test.go
            router/relay-router.go
            service/quota.go
            service/quota_audio_test.go
          )
          unformatted=$(gofmt -l "${files[@]}")
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Test backend paths
        working-directory: source
        run: go test ./controller ./middleware ./relay/common ./relay ./router ./service

      - name: Verify playground frontend
        working-directory: source/web/default
        run: |
          bun run typecheck
          ../node_modules/.bin/oxlint -c .oxlintrc.json src/features/playground
          bun run build

      - name: Test image response compatibility service
        run: python3 -m unittest discover -s server/image-url-compat -p 'test_*.py'

      - name: Build image
        run: docker build --pull --tag mad-new-api:latest source

      - name: Export image
        run: |
          docker save mad-new-api:latest | gzip -1 > mad-new-api.tar.gz
          sha256sum mad-new-api.tar.gz > mad-new-api.tar.gz.sha256
          cp server/image-url-compat/service.py image-url-compat.py
          cp server/image-url-compat/image-url-compat.service image-url-compat.service
          cp server/new-api-autoupdate.sh new-api-autoupdate.sh
          sha256sum image-url-compat.py > image-url-compat.py.sha256
          sha256sum image-url-compat.service > image-url-compat.service.sha256
          sha256sum new-api-autoupdate.sh > new-api-autoupdate.sh.sha256
          git -C source rev-parse HEAD > upstream-commit.txt

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete build-latest --cleanup-tag --yes || true
          gh release create build-latest \
            mad-new-api.tar.gz \
            mad-new-api.tar.gz.sha256 \
            image-url-compat.py \
            image-url-compat.py.sha256 \
            image-url-compat.service \
            image-url-compat.service.sha256 \
            new-api-autoupdate.sh \
            new-api-autoupdate.sh.sha256 \
            upstream-commit.txt \
            --title "Mad New API latest build" \
            --notes "Automated build from the pinned upstream New API source with Mad API billing, branding, recharge, multi-model playground, and image response compatibility customizations."
